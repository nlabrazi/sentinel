# docker-compose.override.yml (dev hot reload)
version: '3.8'

services:
  web:
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/sentinel_development
      # Les autres variables sont héritées du docker-compose.yml, mais on peut les redéfinir ici
      GITHUB_TOKEN: ${GITHUB_TOKEN:-fake}
      VPS_HOST: ${VPS_HOST:-vps.local}
      VPS_USER: ${VPS_USER:-control-panel}
      SSH_KEY_PATH: /root/.ssh/id_rsa
    volumes:
      - .:/app                           # monte tout le code en direct
      - ssh_key:/root/.ssh:ro
    ports:
      - "3000:3000"

  solidqueue:
    command: bin/rails solid_queue:start
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/sentinel_development
    volumes:
      - .:/app
      - ssh_key:/root/.ssh:ro

  tailwind:
    build: .
    command: bin/rails tailwindcss:watch
    environment:
      RAILS_ENV: development
    volumes:
      - .:/app
    tty: true                  # pour garder le processus attaché

  db:
    environment:
      POSTGRES_DB: sentinel_development   # override la base de dev
