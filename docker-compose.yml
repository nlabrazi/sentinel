name: sentinel

x-rails-app: &rails-app
  build: .
  user: "${UID:-1000}:${GID:-1000}"
  environment:
    RAILS_ENV: development
    HOME: /tmp
    BUNDLE_PATH: /bundle
    BUNDLE_JOBS: 4
    BUNDLE_RETRY: 3
    POSTGRES_HOST: ${POSTGRES_HOST:-sentinel-db}
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
    CLOUDINARY_URL: ${CLOUDINARY_URL:-}
    CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-sentinel/development}
    APIFLASH_ACCESS_KEY: ${APIFLASH_ACCESS_KEY:-}
    GITHUB_TOKEN: ${GITHUB_TOKEN:-fake}
    VPS_HOST: ${VPS_HOST:-vps.local}
    VPS_USER: ${VPS_USER:-control-panel}
    SSH_KEY_PATH: ${SSH_KEY_PATH:-/app/config/ssh_key/id_rsa}
    SSH_KNOWN_HOSTS_PATH: ${SSH_KNOWN_HOSTS_PATH:-/app/config/ssh_key/known_hosts}
  volumes:
    - .:/app
    - sentinel-bundle:/bundle

services:
  sentinel-api:
    <<: *rails-app
    image: sentinel-api
    container_name: sentinel-api
    command: bash -lc "(bundle check || bundle install) && bin/rails db:prepare && rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0"
    environment:
      RAILS_ENV: development
      HOME: /tmp
      BUNDLE_PATH: /bundle
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
      POSTGRES_HOST: ${POSTGRES_HOST:-sentinel-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-sentinel/development}
      APIFLASH_ACCESS_KEY: ${APIFLASH_ACCESS_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-fake}
      VPS_HOST: ${VPS_HOST:-vps.local}
      VPS_USER: ${VPS_USER:-control-panel}
      SSH_KEY_PATH: ${SSH_KEY_PATH:-/app/config/ssh_key/id_rsa}
      SSH_KNOWN_HOSTS_PATH: ${SSH_KNOWN_HOSTS_PATH:-/app/config/ssh_key/known_hosts}
    volumes:
      - .:/app
      - sentinel-bundle:/bundle
    ports:
      - "3000:3000"
    depends_on:
      sentinel-db:
        condition: service_healthy

  sentinel-ui:
    <<: *rails-app
    image: sentinel-ui
    container_name: sentinel-ui
    command: bash -lc "(bundle check || bundle install) && bin/rails tailwindcss:watch"
    tty: true
    depends_on:
      sentinel-api:
        condition: service_started

  sentinel-db:
    image: postgres:16
    container_name: sentinel-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinel_development
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sentinel-postgres-data:
  sentinel-bundle:
